# Arquivo principal de configuracao da aplicacao PetShop POO.
# Centraliza porta, conexao com MySQL, JPA e Thymeleaf.

spring.application.name=petshop-poo
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/petshop_poo?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.thymeleaf.cache=false
spring.jpa.open-in-view=false